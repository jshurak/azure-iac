name: iac-1-manual-deploy

on:
  workflow_dispatch:


permissions:
  id-token: write
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      - uses: actions/checkout@v3
      - name: Run Bicep linter
        run: az bicep build --file azure-iac-1/main.bicep
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      - name: Checkout Code
        uses: actions/checkout@v3
      - name: Validate Bicep Template
        uses: azure/bicep-deploy@v2
        with:
          type: deployment
          operation: validate
          scope: subscription
          name: centralus-main
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          resource-group-name: ${{ secrets.AZURE_RESOURCE_GROUP_NAME }}
          template-file: azure-iac-1/main.bicep
          parameters-file: azure-iac-1/main.bicepparam
          parameters: '{subscription: ${{ secrets.AZURE_SUBSCRIPTION_ID }}, keyVaultResourceGroupName: ${{ secrets.AZURE_KEYVAULT_RESOURCEGROUP_NAME }}, keyVaultName: ${{secrets.AZURE_KEYVAULT_NAME}}, sshKeyVaultSecretName: ${{secrets.SSH_KEY_NAME}}, allowedSshSourceIp: ${{ secrets.SITE_PIP }}}'
          location: centralus
      - name: What-if Preview
        uses: azure/bicep-deploy@v2
        with:
          type: deployment
          operation: whatIf
          scope: subscription
          name: centralus-main
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          resource-group-name: ${{ secrets.AZURE_RESOURCE_GROUP_NAME }}
          template-file: azure-iac-1/main.bicep
          parameters-file: azure-iac-1/main.bicepparam
          parameters: '{subscription: ${{ secrets.AZURE_SUBSCRIPTION_ID }}, keyVaultResourceGroupName: ${{ secrets.AZURE_KEYVAULT_RESOURCEGROUP_NAME }}, keyVaultName: ${{secrets.AZURE_KEYVAULT_NAME}}, sshKeyVaultSecretName: ${{secrets.SSH_KEY_NAME}}, allowedSshSourceIp: ${{ secrets.SITE_PIP }}}'
          location: centralus
  deploy:
    runs-on: ubuntu-latest
    environment: production
    needs: [lint, validate]
    steps:
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      - name: Checkout Code
        uses: actions/checkout@v3
      - name: Deploy to Azure
        uses: azure/bicep-deploy@v2
        with:
          type: deploymentStack
          operation: create
          scope: subscription
          name: centralus-main
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          resource-group-name: ${{ secrets.AZURE_RESOURCE_GROUP_NAME }}
          template-file: azure-iac-1/main.bicep
          parameters-file: azure-iac-1/main.bicepparam
          parameters: '{subscription: ${{ secrets.AZURE_SUBSCRIPTION_ID }}, keyVaultResourceGroupName: ${{ secrets.AZURE_KEYVAULT_RESOURCEGROUP_NAME }}, keyVaultName: ${{secrets.AZURE_KEYVAULT_NAME}}, sshKeyVaultSecretName: ${{secrets.SSH_KEY_NAME}}, allowedSshSourceIp: ${{ secrets.SITE_PIP }}}'
          action-on-unmanage-resources: delete
          deny-settings-mode: none
          location: centralus