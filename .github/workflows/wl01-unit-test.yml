name: wl01-unit-test

on:
  pull_request:
    paths:
      - 'wl01/**'
    branches:
    - main

permissions:
  id-token: write
  contents: read
  security-events: write

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      - uses: actions/checkout@v3
      - name: Run Bicep linter
        run: az bicep build --file wl01/main.bicep
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      - name: Checkout Code
        uses: actions/checkout@v3
      - name: Validate Bicep Template
        uses: azure/bicep-deploy@v2
        with:
          type: deployment
          operation: validate
          scope: subscription
          name: wl01-main
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          resource-group-name: ${{ secrets.AZURE_RESOURCE_GROUP_NAME }}
          template-file: wl01/main.bicep
          parameters-file: wl01/main.bicepparam
          #parameters: '{subscription: ${{ secrets.AZURE_SUBSCRIPTION_ID }}}'
          location: eastus2
      - name: What-if Preview
        uses: azure/bicep-deploy@v2
        with:
          type: deployment
          operation: whatIf
          scope: subscription
          name: wl01-main
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          resource-group-name: ${{ secrets.AZURE_RESOURCE_GROUP_NAME }}
          template-file: wl01/main.bicep
          parameters-file: wl01/main.bicepparam
          #parameters: '{subscription: ${{ secrets.AZURE_SUBSCRIPTION_ID }}}'
          location: eastus2
      - name: Run Checkov actions/checkout
        id:  checkov
        uses: bridgecrewio/checkov-action@master
        with:
          directory: wl01/
          check: CKV_AZURE_159,CKV_AZURE_211,CKV_AZURE_207
          framework: bicep
      - name: Upload SARIF --file
        if: success() || failure()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: results.sarif
          category: checkov